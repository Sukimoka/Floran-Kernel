name: Matrix Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
    strategy:
      matrix:
        rom_source: [YAAP, Crdroid, PixelOS, LineageOS]
        ksu_type: [KernelSU-Next-susfs, ReSukiSU-susfs]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
       
      - name: Setup SWAP
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16
          
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison flex libssl-dev libelf-dev libdw-dev build-essential lz4 git python3 curl dwarves cpio gcc-aarch64-linux-gnu
          
      - name: Clone Kernel Source and Download AOSP Clang
        run: |
          if [[ "${{ matrix.rom_source }}" == "YAAP" ]]; then
            git clone --depth=1 -b sixteen https://github.com/Sukimoka/android_kernel_oneplus_sm8650.git sm8650
            git clone --depth=1 -b sixteen https://github.com/Sukimoka/android_kernel_oneplus_sm8650-modules.git sm8650-modules
          elif [[ "${{ matrix.rom_source }}" == "LineageOS" ]]; then
            git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8650.git sm8650
            git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_oneplus_sm8650-modules.git sm8650-modules
          elif [[ "${{ matrix.rom_source }}" == "Crdroid" ]]; then
            git clone --depth=1 -b 16.0 https://github.com/crdroidandroid/android_kernel_oneplus_sm8650.git sm8650
            git clone --depth=1 -b 16.0 https://github.com/crdroidandroid/android_kernel_oneplus_sm8650-modules.git sm8650-modules
          elif [[ "${{ matrix.rom_source }}" == "PixelOS" ]]; then
            git clone --depth=1 -b sixteen-qpr2 https://github.com/PixelOS-Devices/android_kernel_oneplus_sm8650.git sm8650
            git clone --depth=1 -b sixteen-qpr2 https://github.com/PixelOS-Devices/android_kernel_oneplus_sm8650-modules.git sm8650-modules
          fi

          mkdir -p toolchains/clang-r563880c
          cd toolchains
          curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android16-qpr2-release/clang-r563880c.tar.gz
          tar -xf "clang-r563880c.tar.gz" -C clang-r563880c

      - name: Compile Kernel
        run: |
          CLANG_ROOT="${GITHUB_WORKSPACE}/toolchains/clang-r563880c/bin"
          export PATH="${CLANG_ROOT}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CC=clang CXX=clang++ HOSTCC=clang HOSTCXX=clang++ LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip

          cd sm8650

          if [[ "${{ matrix.ksu_type }}" == KernelSU-Next-susfs ]]; then
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
          elif [[ "${{ matrix.ksu_type }}" == ReSukiSU-susfs ]]; then
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s main
          fi

          git clone -b gki-android14-6.1 https://gitlab.com/simonpunk/susfs4ksu.git susfs
          cd susfs
          cp ./kernel_patches/50_add_susfs_in_gki-android14-6.1.patch ..
          cp ./kernel_patches/fs/* ../fs/
          cp ./kernel_patches/include/linux/* ../include/linux/
          cd ..
          
          patch -p1 < 50_add_susfs_in_gki-android14-6.1.patch || true

          if [ -f fs/namespace.c ] && ! grep -q "linux/susfs_def.h" fs/namespace.c; then
            echo "正在修复SUSFS"
              
            sed -i '/extern bool susfs_is_sdcard_android_data_decrypted/d' ./fs/namespace.c
            sed -i '/extern bool susfs_is_current_ksu_domain/d' ./fs/namespace.c
              
            echo '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT' > /tmp/susfs_fix.txt
            echo '#include <linux/susfs_def.h>' >> /tmp/susfs_fix.txt
            echo 'extern bool susfs_is_current_ksu_domain(void);' >> /tmp/susfs_fix.txt
            echo '#include <linux/jump_label.h>' >> /tmp/susfs_fix.txt
            echo 'DECLARE_STATIC_KEY_FALSE(susfs_set_sdcard_android_data_decrypted_key_false);' >> /tmp/susfs_fix.txt
            echo '' >> /tmp/susfs_fix.txt
            echo '#ifndef CL_COPY_MNT_NS' >> /tmp/susfs_fix.txt
            echo '#define CL_COPY_MNT_NS BIT(25)' >> /tmp/susfs_fix.txt
            echo '#endif' >> /tmp/susfs_fix.txt
            echo '' >> /tmp/susfs_fix.txt
            echo 'static DEFINE_IDA(susfs_mnt_id_ida);' >> /tmp/susfs_fix.txt
            echo 'static DEFINE_IDA(susfs_mnt_group_ida);' >> /tmp/susfs_fix.txt
            echo '#endif' >> /tmp/susfs_fix.txt

            sed -i '/#include "internal.h"/r /tmp/susfs_fix.txt' ./fs/namespace.c
            rm -f /tmp/susfs_fix.txt
            echo "SUSFS修复完成"
          fi

          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=n" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> arch/arm64/configs/gki_defconfig

          touch ./.scmversion
          sed -i "s|CONFIG_MODULE_SIG_PROTECT=y|CONFIG_MODULE_SIG_PROTECT=n|" arch/arm64/configs/gki_defconfig
          echo "CONFIG_TMPFS_XATTR=y" >> arch/arm64/configs/gki_defconfig

          echo "CONFIG_TCP_CONG_ADVANCED=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_BBR=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_NET_SCH_FQ=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_BIC=n" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_WESTWOOD=n" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_HTCP=n" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_ECN=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_ECN=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IPV6_ECN=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_NF_TARGET_ECN=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_BPF_STREAM_PARSER=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_NETFILTER_XT_SET=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_MAX=65534" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_BITMAP_IP=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_BITMAP_IPMAC=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_BITMAP_PORT=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IP=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPMARK=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPPORT=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPPORTIP=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPPORTNET=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPMAC=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_MAC=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETPORTNET=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NET=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETNET=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETPORT=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETIFACE=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_LIST_SET=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP6_NF_NAT=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP6_NF_TARGET_MASQUERADE=y" >> arch/arm64/configs/gki_defconfig
          
          echo "Applying IPv6_NAT Fix..."
           curl -LSsO https://raw.githubusercontent.com/Numbersf/Action-Build/SukiSU-Ultra/patches/IPv6_NAT_FIX.patch
           patch -p1 -F 3 < IPv6_NAT_FIX.patch || true

          CUSTOM_NAME="-FloranKernel-OSS"
          echo "CONFIG_LOCALVERSION=\"${CUSTOM_NAME}\"" >> arch/arm64/configs/gki_defconfig
          echo "Kernel name set to: ${CUSTOM_NAME}"

          make O=out gki_defconfig vendor/pineapple_GKI.config vendor/oplus/pineapple_GKI.config
          make -j2 O=out Image

      - name: Make AnyKernel3
        run: |
          if [[ "${{ matrix.ksu_type }}" == "KernelSU-Next-susfs" ]]; then
            ZIP_PREFIX="KernelSU-Next-SUSFS"
          elif [[ "${{ matrix.ksu_type }}" == "ReSukiSU-susfs" ]]; then
            ZIP_PREFIX="ReSukiSU-SUSFS"
          fi
          
          ZIP_NAME="${{ matrix.rom_source }}-${ZIP_PREFIX}-Floran-$(date -u +"%m%d")"
          git clone --depth=1 https://github.com/Kernel-SU/AnyKernel3.git
          cp sm8650/out/arch/arm64/boot/Image AnyKernel3/Image
          cd AnyKernel3
          zip -r9 ../"${ZIP_NAME}.zip" * -x .git

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_ZIP_${{ matrix.rom_source }}_${{ matrix.ksu_type }}
          path: "*.zip"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read

    steps:
      - name: Download all ZIP artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Kernel_ZIP_*
          path: ./release_zips
          merge-multiple: true

      - name: Set release env
        run: |
          TIME_FORM="$(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          echo "TIME_FORM=$TIME_FORM" >> $GITHUB_ENV
          VERSION=$((${{ github.run_number }} - 1))
          REL_TAG="FloranKernel-R${VERSION}"
          echo "REL_TAG=$REL_TAG" >> $GITHUB_ENV
          echo "REL_TITLE=Floran Kernel Build Release！" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "${{ env.REL_TAG }}"
          name: "${{ env.REL_TITLE }}"
          body: |         
            
            | Field | Value |
            |---|---|
            |    ROM 支持   | YAAP, Crdroid, PixelOS, LineageOS |
            | KernelSU 方案 |      KernelSUNext, ReSukiSU       |
            |   Build时间   |       ${{ env.TIME_FORM }}        |

            **Manager downloads:**
            - KernelSU-Next: [KernelSU-Next](https://github.com/KernelSU-Next/KernelSU-Next)
            - ReSukiSU: [ReSukiSU](https://github.com/ReSukiSU/ReSukiSU)
          draft: false
          prerelease: false
          files: release_zips/*.zip